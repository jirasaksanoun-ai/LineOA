<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>เข้าสู่ระบบ</title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>

  <!-- Sarabun — อ่านง่าย, ไทย native, mobile friendly -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --green:       #06C755;
      --green-dark:  #04A844;
      --green-soft:  #E7F9EE;
      --text:        #111827;
      --text-sub:    #6B7280;
      --text-hint:   #9CA3AF;
      --bg:          #F5F7FA;
      --surface:     #FFFFFF;
      --border:      #E5E7EB;
      --error-bg:    #FEF2F2;
      --error-bd:    #FECACA;
      --error-text:  #DC2626;
      --radius:      16px;
      --radius-sm:   10px;
    }

    html {
      height: 100%;
      /* ป้องกัน iOS bounce scroll */
      overscroll-behavior: none;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      min-height: 100dvh;          /* dvh = dynamic viewport height, mobile-safe */
      min-height: 100vh;           /* fallback */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 16px) 20px env(safe-area-inset-bottom, 24px);
      -webkit-font-smoothing: antialiased;
      color: var(--text);
    }

    /* ── CARD ────────────────────────── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
      animation: rise .4s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── HEADER ──────────────────────── */
    .hd {
      background: var(--green);
      padding: 36px 28px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* วงกลม decoration */
    .hd::before {
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(circle at 80% -10%, rgba(255,255,255,.15) 0%, transparent 60%);
      pointer-events:none;
    }

    .logo {
      width: 60px; height: 60px;
      background: rgba(255,255,255,.22);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      backdrop-filter: blur(6px);
      position: relative;
    }

    .logo svg { width:32px; height:32px; fill:#fff; }

    .hd h1 { font-size: 20px; font-weight: 600; color: #fff; }
    .hd p  { font-size: 13px; color: rgba(255,255,255,.78); margin-top: 5px; font-weight: 300; }

    /* ── FORM BODY ───────────────────── */
    .body { padding: 24px 24px 28px; }

    /* Error banner */
    .err {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      margin-bottom: 16px;
      font-size: 13.5px;
      color: var(--error-text);
      animation: shake .35s both;
    }
    .err.show { display: flex; }
    .err svg  { width:16px; height:16px; stroke: var(--error-text); fill:none; flex-shrink:0; }

    @keyframes shake {
      0%,100%{ transform:translateX(0) }
      20%    { transform:translateX(-6px) }
      40%    { transform:translateX(6px) }
      60%    { transform:translateX(-4px) }
      80%    { transform:translateX(4px) }
    }

    /* Field */
    .field { margin-bottom: 16px; }
    label  { display:block; font-size:12.5px; font-weight:500; color:var(--text-sub); margin-bottom:7px; letter-spacing:.3px; }

    .inp-wrap { position:relative; }

    .inp-wrap .ico {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      width:18px; height:18px; stroke:var(--text-hint); fill:none;
      stroke-width:1.8; transition:stroke .18s;
      pointer-events:none;
    }

    input[type=text],
    input[type=password] {
      width:100%;
      padding: 14px 14px 14px 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 16px;           /* 16px ป้องกัน iOS zoom เวลา focus */
      font-weight: 400;
      color: var(--text);
      background: #FAFAFA;
      outline: none;
      -webkit-appearance: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }

    input:focus {
      border-color: var(--green);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(6,199,85,.13);
    }

    .inp-wrap:focus-within .ico { stroke: var(--green); }

    /* eye toggle */
    .eye {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; padding:6px;
      color:var(--text-hint); display:flex; align-items:center;
      transition:color .18s; -webkit-appearance:none;
      /* ขยาย touch target */
      min-width:44px; min-height:44px; justify-content:center;
    }
    .eye:hover { color:var(--text-sub); }
    .eye svg   { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.8; }

    /* Submit */
    .btn {
      width:100%; padding: 15px;
      background: var(--green);
      color:#fff; border:none;
      border-radius: var(--radius-sm);
      font-family:inherit; font-size:16px; font-weight:600;
      cursor:pointer; margin-top:4px;
      transition: background .18s, transform .1s;
      -webkit-appearance:none;
      /* ป้องกัน double-tap zoom บน iOS */
      touch-action: manipulation;
    }
    .btn:hover  { background: var(--green-dark); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { background:#D1D5DB; cursor:not-allowed; }

    .btn .spin {
      display:none; width:20px; height:20px;
      border:2.5px solid rgba(255,255,255,.35);
      border-top-color:#fff; border-radius:50%;
      animation: rot .65s linear infinite;
      margin:0 auto;
    }
    .btn.loading .lbl  { display:none; }
    .btn.loading .spin { display:block; }
    @keyframes rot { to{ transform:rotate(360deg) } }

    /* ── SUCCESS ─────────────────────── */
    .success {
      display:none; flex-direction:column;
      align-items:center; text-align:center;
      padding: 36px 24px 32px;
    }
    .success.show { display:flex; }
    .body.hide    { display:none; }

    .tick {
      width:68px; height:68px;
      background: var(--green-soft);
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:16px;
      animation: pop .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    .tick svg { width:34px; height:34px; stroke:var(--green); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    @keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

    .success h2 { font-size:18px; font-weight:600; margin-bottom:8px; }
    .success p  { font-size:14px; color:var(--text-sub); line-height:1.6; }

    /* Footer */
    .foot {
      font-size:12px; color:var(--text-hint);
      text-align:center; margin-top:16px;
      animation: rise .4s .2s both;
    }

    /* ── RESPONSIVE safety ───────────── */
    @media (max-height: 640px) {
      .hd   { padding: 24px 24px 20px; }
      .logo { width:48px; height:48px; margin-bottom:10px; }
      .hd h1{ font-size:18px; }
      .body { padding: 20px 20px 24px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- HEADER -->
  <div class="hd">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2zm-2 10H6V10h12v2zm0-4H6V6h12v2z"/></svg>
    </div>
    <h1>เข้าสู่ระบบ</h1>
    <p>กรุณายืนยันตัวตนเพื่อใช้งาน</p>
  </div>

  <!-- FORM -->
  <div class="body" id="formBody">

    <div class="err" id="errBox">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errText">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
    </div>

    <div class="field">
      <label for="username">ชื่อผู้ใช้</label>
      <div class="inp-wrap">
        <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้"
               autocomplete="username" autocapitalize="none" spellcheck="false"
               inputmode="text">
        <svg class="ico" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    </div>

    <div class="field">
      <label for="password">รหัสผ่าน</label>
      <div class="inp-wrap">
        <input type="password" id="password" placeholder="กรอกรหัสผ่าน"
               autocomplete="current-password">
        <svg class="ico" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <button class="eye" id="eyeBtn" type="button" onclick="togglePw()" aria-label="แสดง/ซ่อนรหัสผ่าน">
          <svg id="eyeIco" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">
      <span class="lbl">เข้าสู่ระบบ</span>
      <div class="spin"></div>
    </button>

  </div>

  <!-- SUCCESS -->
  <div class="success" id="successBox">
    <div class="tick">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>เข้าสู่ระบบสำเร็จ!</h2>
    <p id="successName">กำลังปิดหน้าต่างนี้...</p>
  </div>

</div>

<p class="foot">ข้อมูลของคุณปลอดภัยและเข้ารหัสอย่างสมบูรณ์</p>

<script>
  // ── CONFIG ── แก้ 2 ค่านี้ก่อน deploy
  const GAS_URL = 'YOUR_GAS_WEB_APP_URL';
  const LIFF_ID = 'YOUR_LIFF_ID';

  let lineUserId = null;

  // ── LIFF INIT ────────────────────────────────────────────────
  (async () => {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return;
      }

      const profile = await liff.getProfile();
      lineUserId = profile.userId;

    } catch (err) {
      showErr('ไม่สามารถเชื่อมต่อ LINE ได้ กรุณาลองใหม่');
      console.error('LIFF init:', err);
    }
  })();

  // ── LOGIN ────────────────────────────────────────────────────
  async function doLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    if (!user) { showErr('กรุณากรอกชื่อผู้ใช้'); return; }
    if (!pass) { showErr('กรุณากรอกรหัสผ่าน');  return; }
    if (!lineUserId) { showErr('ไม่พบข้อมูล LINE กรุณาปิดแล้วเปิดใหม่'); return; }

    hideErr();
    setLoading(true);

    try {
      const res  = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ action: 'login', username: user, password: pass, lineUserId }),
      });
      const data = await res.json();

      if (data.success) {
        showSuccess(data.name || user);
        setTimeout(() => {
          if (liff.isInClient()) liff.closeWindow();
        }, 1800);
      } else {
        showErr(data.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
      }
    } catch (err) {
      showErr('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
    } finally {
      setLoading(false);
    }
  }

  // Enter to submit
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // ── UI HELPERS ───────────────────────────────────────────────
  function setLoading(on) {
    const b = document.getElementById('loginBtn');
    b.classList.toggle('loading', on);
    b.disabled = on;
  }

  function showErr(msg) {
    document.getElementById('errText').textContent = msg;
    document.getElementById('errBox').classList.add('show');
  }

  function hideErr() {
    document.getElementById('errBox').classList.remove('show');
  }

  function showSuccess(name) {
    document.getElementById('formBody').classList.add('hide');
    document.getElementById('successName').innerHTML = `ยินดีต้อนรับ <strong>${name}</strong><br>กำลังปิดหน้าต่างนี้...`;
    document.getElementById('successBox').classList.add('show');
  }

  function togglePw() {
    const inp  = document.getElementById('password');
    const ico  = document.getElementById('eyeIco');
    const show = inp.type === 'password';
    inp.type   = show ? 'text' : 'password';
    ico.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
</script>
</body>
</html>
